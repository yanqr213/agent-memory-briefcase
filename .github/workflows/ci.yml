name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Run example check
        run: python -m agent_memory_briefcase check --root examples/demo_bundle --check warning
      - name: Run handoff export smoke
        run: python -m agent_memory_briefcase export --root examples/demo_bundle --format handoff --output build/agent-handoff.md
      - name: Run doctor smoke
        run: python -m agent_memory_briefcase doctor --root examples/demo_bundle --check warning --output build/agent-doctor.md
      - name: Run SARIF doctor smoke
        run: python -m agent_memory_briefcase doctor --root examples/demo_bundle --format sarif --output build/agent-doctor.sarif
      - name: Run PR comment doctor smoke
        run: python -m agent_memory_briefcase doctor --root examples/demo_bundle --format pr-comment --output build/agent-doctor-comment.md
